<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PasBills - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        text-align: center;
        background: white;
        border-radius: 12px;
        padding: 40px 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
      }

      .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      h1 {
        color: #1f2937;
        font-size: 24px;
        margin-bottom: 10px;
      }

      p {
        color: #6b7280;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: opacity 0.3s;
      }

      .button:hover {
        opacity: 0.9;
      }

      .button:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📱</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost internet connection. Some features may be
        limited. Please check your connection and try again.
      </p>
      <button class="button" onclick="location.reload()">Try Again</button>
    </div>
  </body>
</html>
